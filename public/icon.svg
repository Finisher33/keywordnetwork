<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 (둥근 사각) -->
  <rect width="512" height="512" rx="112" fill="#002c5f"/>
  <!-- 부드러운 글로우 -->
  <defs>
    <radialGradient id="g" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#4d9fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#002c5f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>

  <!-- 네트워크 연결선 (중심 → 주변) -->
  <g stroke="#bfe2ff" stroke-width="9" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="256" x2="128" y2="148"/>
    <line x1="256" y1="256" x2="384" y2="148"/>
    <line x1="256" y1="256" x2="112" y2="332"/>
    <line x1="256" y1="256" x2="400" y2="332"/>
    <line x1="256" y1="256" x2="256" y2="408"/>
  </g>

  <!-- 외곽 노드 -->
  <g>
    <circle cx="128" cy="148" r="34" fill="#7dc8ff"/>
    <circle cx="384" cy="148" r="34" fill="#7dc8ff"/>
    <circle cx="112" cy="332" r="34" fill="#7dc8ff"/>
    <circle cx="400" cy="332" r="34" fill="#7dc8ff"/>
    <circle cx="256" cy="408" r="34" fill="#7dc8ff"/>
  </g>

  <!-- 중앙 노드 (강조) -->
  <circle cx="256" cy="256" r="62" fill="#ffffff"/>
  <circle cx="256" cy="256" r="44" fill="#0066d4"/>
  <circle cx="256" cy="256" r="14" fill="#ffffff"/>
</svg>
